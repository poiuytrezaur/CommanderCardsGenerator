<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Commander Deck Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Alegreya:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Alegreya', Georgia, serif;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4mm;
    padding: 5mm;
  }

  @page {
    size: A4 portrait;
    margin: 8mm;
  }

  @media print {
    body {
      background: white;
      gap: 1mm;
      padding: 0;
    }
    .card { break-inside: avoid; }
  }

  .card {
    width: 63mm;
    height: 88mm;
    border-radius: 3mm;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }

  .card-border {
    position: absolute;
    inset: 0;
    border-radius: 3mm;
    border: 1.2mm solid rgba(255,255,255,0.15);
    pointer-events: none;
    z-index: 10;
  }

  .card-header {
    position: relative;
    height: 22mm;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.85) saturate(1.1);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 10mm;
    background: linear-gradient(transparent, var(--card-bg));
    z-index: 1;
  }

  .card-name-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 0 2mm 0.5mm 2mm;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .commander-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 8.5pt;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.5);
    line-height: 1.1;
    max-width: 80%;
  }

  .mana-pips {
    display: flex;
    gap: 0.5mm;
    flex-shrink: 0;
  }

  .mana-pip {
    width: 3.5mm;
    height: 3.5mm;
    border-radius: 50%;
    border: 0.3mm solid rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6.5pt;
    font-weight: 900;
    text-shadow: 0 0.5px 1px rgba(0,0,0,0.3);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.4);
  }

  .pip-W { background: radial-gradient(circle at 30% 30%, #fff9e6, #f0d860); color: #6b5c1f; }
  .pip-U { background: radial-gradient(circle at 30% 30%, #4fa8d8, #0a4f8a); color: #c8e4f8; }
  .pip-B { background: radial-gradient(circle at 30% 30%, #555, #1a1a1a); color: #bbb; }
  .pip-R { background: radial-gradient(circle at 30% 30%, #f06040, #a01020); color: #ffddc8; }
  .pip-G { background: radial-gradient(circle at 30% 30%, #50b060, #1a6030); color: #d0f0c8; }

  .card-body {
    flex: 1;
    background: var(--card-bg);
    padding: 1.5mm 2mm 1mm 2mm;
    display: flex;
    flex-direction: column;
    gap: 0.8mm;
    overflow: hidden;
  }

  .deck-name {
    font-family: 'Cinzel', serif;
    font-size: 7.5pt;
    color: var(--accent);
    text-align: center;
    letter-spacing: 0.3mm;
    text-transform: uppercase;
    line-height: 1;
    opacity: 0.8;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 6.5pt;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.2mm;
    border-bottom: 0.2mm solid var(--accent-dim);
    padding-bottom: 0.3mm;
    margin-bottom: 0.2mm;
    line-height: 1;
  }

  .strategy-text {
    font-size: 7pt;
    color: var(--text);
    line-height: 1.25;
  }

  .combos-list {
    font-size: 6.5pt;
    color: var(--text);
    line-height: 1.2;
    list-style: none;
  }

  .combos-list li {
    padding-left: 2mm;
    position: relative;
    margin-bottom: 0.2mm;
  }

  .combos-list li::before {
    content: '⚔';
    position: absolute;
    left: 0;
    font-size: 5.5pt;
    color: var(--accent);
  }

  .mana-curve-section {
    margin-top: auto;
    flex-shrink: 0;
    padding: 0.5mm 1mm;
  }

  .mana-curve {
    display: flex;
    align-items: flex-end;
    gap: 0.5mm;
    height: 12.5mm;
    padding-top: 0.75mm;
  }

  .mana-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }

  .mana-bar {
    width: 100%;
    background: var(--accent);
    border-radius: 0.3mm 0.3mm 0 0;
    min-height: 0;
    opacity: 0.75;
    transition: opacity 0.2s;
  }

  .mana-bar-label {
    font-size: 6pt;
    color: var(--text-dim);
    line-height: 1;
    margin-top: 0.25mm;
  }

  .mana-bar-count {
    font-size: 5pt;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 0.15mm;
  }

  .avg-mv {
    font-size: 5.5pt;
    color: var(--text-dim);
    text-align: right;
    line-height: 1;
    margin-top: 0.3mm;
  }
</style>
</head>
<body>

    art: "https://assets.moxfield.net/cards/card-O959K-art_crop.webp",
    colors: ["U", "R"],

const pipLetters = { W: 'W', U: 'U', B: 'B', R: 'R', G: 'G' };

function renderCard(deck) {
  const maxCurve = Math.max(...deck.curve);
  const curveHTML = deck.curve.map((count, i) => {
    const pct = maxCurve > 0 ? (count / maxCurve) * 80 : 0;
    return `
      <div class="mana-bar-group">
        <span class="mana-bar-count">${count > 0 ? count : ''}</span>
        <div class="mana-bar" style="height:${pct}%"></div>
        <span class="mana-bar-label">${i}</span>
      </div>`;
  }).join('');

  const pipsHTML = deck.colors.map(c =>
    `<span class="mana-pip pip-${c}">${pipLetters[c]}</span>`
  ).join('');

  const combosHTML = deck.combos.map(c =>
    `<li>${c}</li>`
  ).join('');

  return `
    <div class="card" style="--card-bg:${deck.bg};--accent:${deck.accent};--accent-dim:${deck.accentDim};--text:${deck.text};--text-dim:${deck.textDim}">
      <div class="card-border"></div>
      <div class="card-header">
        <img data-commander="${deck.commander}" alt="${deck.commander}" loading="lazy">
        <div class="card-name-bar">
          <span class="commander-name">${deck.commander}</span>
          <span class="mana-pips">${pipsHTML}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="deck-name">${deck.name}</div>
        <div class="section-label">Strategy</div>
        <div class="strategy-text">${deck.strategy}</div>
        <div class="section-label">Winning Lines</div>
        <ul class="combos-list">${combosHTML}</ul>
        <div class="mana-curve-section">
          <div class="section-label">Mana Curve</div>
          <div class="mana-curve">${curveHTML}</div>
          <div class="avg-mv">Avg MV ${deck.avgMv.toFixed(2)}</div>
        </div>
      </div>
    </div>`;
}

document.body.innerHTML = decks.map(renderCard).join('');

// Fetch art from Scryfall JSON API (handles DFCs and gives stable image URLs)
document.querySelectorAll('img[data-commander]').forEach(async img => {
  const name = img.dataset.commander;
  try {
    const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    const uri = data.image_uris?.art_crop
      ?? data.card_faces?.[0]?.image_uris?.art_crop;
    if (uri) img.src = uri;
  } catch (e) { /* network failure — img stays blank */ }
});
</script>
</body>
</html>
