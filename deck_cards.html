<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches Commander — Collection de Decks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'PT Serif', Georgia, serif;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4mm;
    padding: 5mm;
  }

  @page {
    size: A4 portrait;
    margin: 8mm;
  }

  @media print {
    body {
      background: white;
      gap: 1mm;
      padding: 0;
    }
    .card { break-inside: avoid; }
  }

  .card {
    width: 63mm;
    height: 88mm;
    border-radius: 3mm;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .card-border {
    position: absolute;
    inset: 0;
    border-radius: 3mm;
    border: 0.5mm solid rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 10;
  }

  .card-header {
    position: relative;
    height: 18mm;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center var(--img-y, top);
    display: block;
    filter: brightness(0.9) saturate(1.05);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 10mm;
    background: linear-gradient(transparent, var(--card-bg));
    z-index: 1;
  }

  .card-name-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 3mm 2mm 0.5mm 2mm;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    background: linear-gradient(transparent, rgba(0,0,0,0.5));
  }

  .commander-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 8.5pt;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.8), 1px 1px 0 rgba(0,0,0,0.9);
    line-height: 1.1;
    max-width: 80%;
  }

  .mana-pips {
    display: flex;
    gap: 0.5mm;
    flex-shrink: 0;
  }

  .mana-pip {
    width: 4mm;
    height: 4mm;
    flex-shrink: 0;
  }

  .mana-pip img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .card-body {
    flex: 1;
    background: var(--card-bg);
    padding: 1.5mm 2mm 1mm 2mm;
    display: flex;
    flex-direction: column;
    gap: 0.6mm;
    overflow: hidden;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 6.5pt;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.3mm;
    border-bottom: 0.3mm solid var(--accent-dim);
    padding-bottom: 0.3mm;
    margin-bottom: 0.5mm;
    line-height: 1;
  }

  .strategy-text {
    font-size: 7pt;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 1mm;
  }

  .combos-list {
    font-size: 7pt;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
    list-style: none;
  }

  .combos-list li {
    padding-left: 2mm;
    position: relative;
    margin-bottom: 0.4mm;
  }

  .combos-list li::before {
    content: '\2694';
    position: absolute;
    left: 0;
    font-size: 5pt;
    color: var(--accent);
  }

  .keywords-line {
    font-size: 6.5pt;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: 0.01em;
    font-style: italic;
    margin-top: 0.5mm;
  }

  .keywords-line strong {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    font-size: 6.5pt;
  }

  .mana-curve-section {
    margin-top: auto;
    flex-shrink: 0;
    padding: 0.5mm 1mm;
  }

  .mana-curve {
    display: flex;
    align-items: flex-end;
    gap: 0.5mm;
    height: 10mm;
    padding-top: 0.5mm;
  }

  .mana-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }

  .mana-bar {
    width: 100%;
    background: var(--accent);
    border-radius: 0.3mm 0.3mm 0 0;
    min-height: 0;
    opacity: 0.75;
  }

  .mana-bar-label {
    font-size: 5.5pt;
    color: var(--textDim);
    line-height: 1;
    margin-top: 0.2mm;
  }

  .mana-bar-count {
    font-size: 5pt;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.1mm;
  }

  .avg-mv {
    font-size: 5.5pt;
    color: var(--text);
    text-align: right;
    line-height: 1;
    margin-top: 0.3mm;
  }

</style>
</head>

const pipSvgs = { W: 'https://svgs.scryfall.io/card-symbols/W.svg', U: 'https://svgs.scryfall.io/card-symbols/U.svg', B: 'https://svgs.scryfall.io/card-symbols/B.svg', R: 'https://svgs.scryfall.io/card-symbols/R.svg', G: 'https://svgs.scryfall.io/card-symbols/G.svg' };

function renderCard(deck) {
  const maxCurve = Math.max(...deck.curve);
  const curveHTML = deck.curve.map((count, i) => {
    const pct = maxCurve > 0 ? (count / maxCurve) * 80 : 0;
    return `
      <div class="mana-bar-group">
        <span class="mana-bar-count">${count > 0 ? count : ''}</span>
        <div class="mana-bar" style="height:${pct}%"></div>
        <span class="mana-bar-label">${i}</span>
      </div>`;
  }).join('');

  const pipsHTML = deck.colors.map(c =>
    `<span class="mana-pip"><img src="${pipSvgs[c]}" alt="{${c}}" loading="lazy"></span>`
  ).join('');

  const combosHTML = deck.combos.map(c =>
    `<li>${c}</li>`
  ).join('');

  return `
    <div class="card" style="--card-bg:${deck.bg};--accent:${deck.accent};--accent-dim:${deck.accentDim};--text:${deck.text};--text-dim:${deck.textDim};--img-y:${deck.imgY||'top'}">
      <div class="card-border"></div>
      <div class="card-header">
        <img data-commander="${deck.commander}" alt="${deck.commander}" loading="lazy">
        <div class="card-name-bar">
          <span class="commander-name">${deck.commander}</span>
          <span class="mana-pips">${pipsHTML}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="section-label">Stratégie</div>
        <div class="strategy-text">${deck.strategy}</div>
        <div class="section-label">Lignes de Victoire</div>
        <ul class="combos-list">${combosHTML}</ul>
        <div class="keywords-line"><strong>Mots-clés :</strong> ${deck.keywords}</div>
        <div class="mana-curve-section">
          <div class="section-label">Courbe de Mana</div>
          <div class="mana-curve">${curveHTML}</div>
          <div class="avg-mv">Moy. ${deck.avgMv.toFixed(2)}</div>
        </div>
      </div>
    </div>`;
}

document.body.innerHTML = decks.map(renderCard).join('');

// Fetch art from Scryfall JSON API
document.querySelectorAll('img[data-commander]').forEach(async img => {
  const name = img.dataset.commander;
  try {
    const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    const uri = data.image_uris?.art_crop
      ?? data.card_faces?.[0]?.image_uris?.art_crop;
    if (uri) img.src = uri;
  } catch (e) { /* network failure */ }
});
</script>
</body>
</html>
